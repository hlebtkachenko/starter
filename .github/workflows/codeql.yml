name: codeql

# Requires Code Scanning enabled in repo Settings → Security → Code security and analysis.
# Triggered manually until enabled. Once enabled, swap the on: block for the PR + schedule
# variant kept commented below.

on:
  workflow_dispatch:

# on:
#   push:
#     branches: [master]
#     paths-ignore: ["docs/**", "**/*.md"]
#   pull_request:
#     paths-ignore: ["docs/**", "**/*.md"]
#   schedule:
#     - cron: "0 6 * * 1"   # Monday 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
