name: claude

# Requires repo secret ANTHROPIC_API_KEY. Job no-ops gracefully when the secret is unset.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      (contains(github.event.comment.body, '@claude')
       || contains(github.event.review.body, '@claude')
       || contains(github.event.issue.body, '@claude'))
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    steps:
      - name: Skip if no API key
        id: gate
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ANTHROPIC_API_KEY not set; skipping. Set in repo Settings → Secrets to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.skip == 'false'
        name: Pick model
        id: model
        run: |
          body="${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}"
          if echo "$body" | grep -q '\[deep\]'; then
            echo "model=claude-opus-4-7" >> "$GITHUB_OUTPUT"
            echo "max_turns=20" >> "$GITHUB_OUTPUT"
          else
            echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
            echo "max_turns=10" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip == 'false'
        uses: anthropics/claude-code-action@v3
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.model.outputs.model }}
          max_turns: ${{ steps.model.outputs.max_turns }}
