name: claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude') || contains(github.event.review.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Pick model
        id: model
        run: |
          body="${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}"
          if echo "$body" | grep -q '\[deep\]'; then
            echo "model=claude-opus-4-7" >> "$GITHUB_OUTPUT"
            echo "max_turns=20" >> "$GITHUB_OUTPUT"
          else
            echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
            echo "max_turns=10" >> "$GITHUB_OUTPUT"
          fi

      - uses: anthropics/claude-code-action@v3
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ steps.model.outputs.model }}
          max_turns: ${{ steps.model.outputs.max_turns }}
