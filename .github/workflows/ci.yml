name: ci

on:
  push:
    branches: [master]
    paths-ignore:
      - ".planning/**"
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - ".planning/**"
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest  # temporary: self-hosted runner stuck, revert after merge
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm knip || true   # warn day 1
      - run: pnpm build

      # Tests step gated on vitest being installed. The first feature PR that
      # adds vitest unlocks coverage enforcement; until then the step is a no-op.
      - name: tests (gated on vitest install)
        run: |
          if [ -x node_modules/.bin/vitest ]; then
            pnpm test --run
          else
            echo "vitest not installed yet; skipping. Add vitest with the first feature PR."
          fi
