name: ci

on:
  push:
    branches: [master]
    paths-ignore:
      - ".planning/**"
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - ".planning/**"
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm knip || true   # warn day 1
      - run: pnpm build

      # Tests step gated on vitest being installed. The first feature PR that
      # adds vitest unlocks coverage enforcement; until then the step is a no-op.
      - name: tests (gated on vitest install)
        run: |
          if [ -x node_modules/.bin/vitest ]; then
            pnpm test --run
          else
            echo "vitest not installed yet; skipping. Add vitest with the first feature PR."
          fi
