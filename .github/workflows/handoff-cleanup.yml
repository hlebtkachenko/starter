name: handoff-cleanup

# LATER: failsafe. Primary cleanup happens at merge via the squash-commit
# stripping the handoff. This workflow catches drift if the handoff was
# left behind in a follow-up commit on master.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  prune:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove handoff file if present on master
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          slug="${BRANCH//\//-}"
          file="docs/roadmap/handoffs/HANDOFF-$slug.md"
          if [ -f "$file" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm "$file"
            git commit -m "chore(docs): prune handoff for merged $BRANCH"
            git push origin master
          else
            echo "no handoff to prune"
          fi
