name: claude-review

# Requires repo secret ANTHROPIC_API_KEY. The review matrix no-ops when unset.

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
    paths-ignore:
      - ".planning/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  route:
    runs-on: [self-hosted, linux]
    outputs:
      agents: ${{ steps.pick.outputs.agents }}
      has_key: ${{ steps.gate.outputs.has_key }}
    steps:
      - id: gate
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY not set; review matrix will no-op."
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: pick
        env:
          BASE: ${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only "origin/$BASE...HEAD")
          agents=()
          if echo "$changed" | grep -qE '^db/'; then agents+=("migration-reviewer" "tenancy-reviewer"); fi
          if echo "$changed" | grep -qE '^src/features/billing/'; then agents+=("billing-reviewer"); fi
          if echo "$changed" | grep -qE '^infra/'; then agents+=("cost-reviewer" "security-reviewer"); fi
          if echo "$changed" | grep -qE '^src/(proxy\.ts|lib/auth\.ts)'; then agents+=("security-reviewer"); fi
          uniq=$(printf "%s\n" "${agents[@]:-}" | awk 'NF' | sort -u | jq -R . | jq -sc .)
          echo "agents=${uniq:-[]}" >> "$GITHUB_OUTPUT"

  review:
    needs: route
    if: needs.route.outputs.agents != '[]' && needs.route.outputs.has_key == 'true'
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.route.outputs.agents) }}
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v3
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          max_turns: 5
          subagent: ${{ matrix.agent }}
