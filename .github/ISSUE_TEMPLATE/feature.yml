name: Feature request
description: Propose a new capability or scope change.
title: "feat: <short summary>"
labels: ["feature", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Who hurts today? What does the workaround look like?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: One paragraph from the user's POV.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How do we know it worked?
    validations:
      required: true

  - type: dropdown
    id: size
    attributes:
      label: Rough size
      options:
        - S: < 1 day
        - M: 1-3 days
        - L: 1-2 weeks
        - XL: multi-week (decompose first)
