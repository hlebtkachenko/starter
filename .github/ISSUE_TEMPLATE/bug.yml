name: Bug report
description: Something is broken or behaves wrong.
title: "fix: <short summary>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in everything you can: repro is the most useful field.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph: what is broken.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0: total outage / data loss
        - P1: major degradation
        - P2: partial degradation
        - P3: cosmetic / single user
      default: 2
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Numbered steps from a clean state.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "browser, OS, app version, env (local/staging/prod)"

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets and PII before pasting.
