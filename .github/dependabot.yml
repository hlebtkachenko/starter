version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Prague
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    versioning-strategy: increase
    groups:
      next:
        patterns:
          - "next"
          - "next-*"
          - "eslint-config-next"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      tooling:
        patterns:
          - "typescript"
          - "@biomejs/biome"
          - "knip"
          - "eslint*"
          - "@commitlint/*"
          - "lefthook"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
          - "postgres"
      sst:
        patterns:
          - "sst"
          - "@aws-sdk/*"
      sentry:
        patterns:
          - "@sentry/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
          - "@axe-core/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns:
          - "*"
