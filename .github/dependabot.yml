version: 2

# Monthly cadence: pre-PMF this repo doesn't need weekly bump churn.
# Bump to weekly once we have paying customers + on-call rotation.

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Prague
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    versioning-strategy: increase
    groups:
      runtime:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ["*"]
        exclude-patterns: ["@types/*", "eslint*", "@biomejs/*", "vitest", "@vitest/*", "@playwright/*", "knip", "lefthook", "@commitlint/*", "typescript"]
      tooling:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ["@types/*", "eslint*", "@biomejs/*", "vitest", "@vitest/*", "@playwright/*", "knip", "lefthook", "@commitlint/*", "typescript"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns: ["*"]
