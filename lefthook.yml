# Quality gates orchestrator. Installed via `pnpm prepare` (lefthook install).
#
# Note: commands call binaries directly (`biome`, `eslint`) instead of `pnpm exec ...`
# to keep `{staged_files}` interpolation correct. Wrapping in a pnpm script swallows the
# argument list: accepted exception per advisor verdict F12.

pre-commit:
  parallel: true
  commands:
    biome-format:
      # Glob already filters; biome's own ignores narrow further. If everything is
      # ignored, the run produces no changes — wrap with `|| true` so an empty pass
      # doesn't fail the commit. Real format issues still surface via `pnpm format:check`.
      glob: "*.{ts,tsx,js,jsx,mjs,json,jsonc,md,yml,yaml}"
      run: node_modules/.bin/biome format --write {staged_files} || true
      stage_fixed: true
    eslint-fix:
      glob: "*.{ts,tsx,mjs}"
      run: node_modules/.bin/eslint --fix {staged_files}
      stage_fixed: true
    gitleaks:
      # Optional: install via `brew install gitleaks` (macOS) or
      # `https://github.com/gitleaks/gitleaks#installing` (other OSes).
      # Skipped silently when binary missing so a fresh checkout doesn't block commits.
      run: command -v gitleaks >/dev/null 2>&1 && gitleaks protect --staged --source . --no-banner || true
      skip:
        - rebase

commit-msg:
  commands:
    commitlint:
      run: node_modules/.bin/commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    branch-name:
      run: |
        ref=$(git rev-parse --abbrev-ref HEAD)
        if [ "$ref" = "master" ] || [ "$ref" = "main" ]; then exit 0; fi
        echo "$ref" | grep -Eq '^[a-z0-9-]+/[a-z0-9-]+$' || {
          echo "branch '$ref' does not match <git-user>/<short>"
          exit 1
        }
    typecheck:
      run: pnpm typecheck
    paired-files:
      run: command -v yq >/dev/null 2>&1 && bash .github/scripts/check-paired-files.sh || true

post-merge:
  parallel: false
  commands:
    install:
      # Re-install only when the lockfile actually moved in this merge.
      # `glob` filters by changed files in the merge range.
      glob: pnpm-lock.yaml
      run: |
        echo "[post-merge] pnpm-lock.yaml changed -> pnpm install"
        pnpm install --frozen-lockfile
    migrations:
      glob: db/migrations/**
      run: |
        echo "[post-merge] new migrations:"
        git diff --name-only HEAD@{1} HEAD -- db/migrations/ | sed 's/^/  /'
        echo "  run: pnpm db:migrate"
    env:
      glob: .env.example
      run: |
        echo "[post-merge] .env.example changed -> compare keys with .env.local"
        if [ -f .env.local ]; then
          diff <(grep -oE '^[A-Z_][A-Z0-9_]*=' .env.example | sort -u) \
               <(grep -oE '^[A-Z_][A-Z0-9_]*=' .env.local | sort -u) || true
        else
          echo "  no .env.local present"
        fi
    summary:
      run: echo "[post-merge] done"
