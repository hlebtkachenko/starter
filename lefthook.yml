# Quality gates orchestrator. Installed via `pnpm prepare` (lefthook install).
#
# Note: commands call binaries directly (`biome`, `eslint`) instead of `pnpm exec ...`
# to keep `{staged_files}` interpolation correct. Wrapping in a pnpm script swallows the
# argument list — accepted exception per advisor verdict F12.

pre-commit:
  parallel: true
  commands:
    biome-format:
      glob: "*.{ts,tsx,js,jsx,mjs,json,jsonc,md,yml,yaml}"
      run: node_modules/.bin/biome format --write {staged_files}
      stage_fixed: true
    eslint-fix:
      glob: "*.{ts,tsx,mjs}"
      run: node_modules/.bin/eslint --fix {staged_files}
      stage_fixed: true
    gitleaks:
      run: node_modules/.bin/gitleaks protect --staged --source . --no-banner
      skip:
        - rebase

commit-msg:
  commands:
    commitlint:
      run: node_modules/.bin/commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    branch-name:
      run: |
        ref=$(git rev-parse --abbrev-ref HEAD)
        if [ "$ref" = "master" ] || [ "$ref" = "main" ]; then exit 0; fi
        echo "$ref" | grep -Eq '^[a-z0-9-]+/[a-z0-9-]+$' || {
          echo "branch '$ref' does not match <git-user>/<short>"
          exit 1
        }
    typecheck:
      run: pnpm typecheck
    paired-files:
      run: bash .github/scripts/check-paired-files.sh

post-merge:
  commands:
    install:
      glob: pnpm-lock.yaml
      run: pnpm install --frozen-lockfile
